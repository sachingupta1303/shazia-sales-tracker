name: Daily Meeting Alert — 10 AM IST

on:
  schedule:
    - cron: "30 4 * * *"   # 10:00 AM IST  (primary)
    - cron: "0  5 * * *"   # 10:30 AM IST  (backup if primary missed)
  workflow_dispatch:         # manual trigger from GitHub UI anytime

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Fire meeting reminder emails
        run: |
          RESPONSE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://shazia-sales-tracker-gvmj.vercel.app/api/8020/cron-batch?force=1")

          echo "HTTP Status: $RESPONSE"
          echo "Response:"
          cat /tmp/resp.json

          if [ "$RESPONSE" != "200" ]; then
            echo "ERROR: Got HTTP $RESPONSE"
            exit 1
          fi

          SKIPPED=$(cat /tmp/resp.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('skipped','false'))")
          SENT=$(cat /tmp/resp.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sent',0))")
          FAILED=$(cat /tmp/resp.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('failed',0))")

          echo "Skipped: $SKIPPED | Sent: $SENT | Failed: $FAILED"

      - name: Retry on failure (wait 10 min)
        if: failure()
        run: |
          echo "Primary failed — retrying after 10 minutes..."
          sleep 600
          curl -s \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://shazia-sales-tracker-gvmj.vercel.app/api/8020/cron-batch?force=1"
